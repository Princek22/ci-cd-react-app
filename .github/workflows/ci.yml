name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

      - name: Build application
        run: npm run build

      - name: Build Docker image
        run: docker build --tag ci-cd-react-app:${{ github.sha }} .

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag Docker image for GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag ci-cd-react-app:${{ github.sha }} ghcr.io/princek22/ci-cd-react-app:${{ github.sha }}
          docker tag ci-cd-react-app:${{ github.sha }} ghcr.io/princek22/ci-cd-react-app:latest

      - name: Push Docker image to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/princek22/ci-cd-react-app:${{ github.sha }}
          docker push ghcr.io/princek22/ci-cd-react-app:latest
