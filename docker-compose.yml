services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ci-cd-backend
    environment:
      PORT: 5000
      APP_ENV: local
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ci-cd-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
